<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>wchat67 - Signup</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-animation">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <div class="container">
      <div class="card">
        <div class="logo">wchat<span>67</span></div>
        <div class="form-section">
          <h2>Create Account</h2>
          <input type="text" id="signupUsername" class="input-field" placeholder="Username" required>
          <input type="password" id="signupPassword" class="input-field" placeholder="Password" required>
          <button id="signupBtn" class="btn btn-signup">Sign Up</button>
        </div>
        <div class="divider"></div>
        <p style="text-align: center; font-size: 0.9rem; color: #6b6b8d;">
          Already have an account? <a href="index.html" style="color: #00d2ff; text-decoration: none; font-weight: 600;">Login</a>
        </p>
      </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
