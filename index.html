<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>wchat67 - Login</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-animation">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="container">
    <div class="card">
      <div class="logo">wchat<span>67</span></div>
      <div class="form-section">
        <h2>Account Login</h2>
        <input type="text" id="loginUsername" class="input-field" placeholder="Username" required>
        <input type="password" id="loginPassword" class="input-field" placeholder="Password" required>
        <button id="loginBtn" class="btn btn-login">Log In</button>
      </div>
      <div class="divider"></div>
      <div class="form-section">
        <h2>New Here?</h2>
        <p style="color: #6b6b8d; font-size: 0.9rem; text-align: center; margin-bottom: 5px;">Create a secure account to join the network.</p>
        <a href="signup.html" style="text-decoration: none; width: 100%; display: flex; flex-direction: column;">
          <button class="btn btn-signup" style="width: 100%;">Create Account</button>
        </a>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
